<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Lookup — Rock Climbing Gym</title>
    <link rel="stylesheet" href="unified.css">
    <style>
        body {
            background: #4a5f6f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center; margin-bottom: 8px;">Member Lookup</h1>
        <p style="text-align:center; color:#666; font-size:0.9rem; margin-bottom:24px;">Search by ID or by name below</p>

        <!-- Search by ID -->
        <h2 style="font-size:1rem; margin-bottom:12px; color:#555;">Search by Climber ID</h2>
        <form action="SearchName.php" method="POST" style="margin-bottom: 32px;">
            <div class="form-group">
                <label for="climberId">Climber ID</label>
                <input type="number" id="climberId" name="climberId" placeholder="e.g. 101" required min="1">
            </div>
            <button type="submit" class="btn" style="width:100%;">Search by ID</button>
        </form>

        <!-- Search by Name -->
        <h2 style="font-size:1rem; margin-bottom:12px; color:#555;">Search by Name</h2>
        <form action="search.php" method="GET">
            <div class="form-group">
                <label for="searchName">Climber Name</label>
                <input type="text" id="searchName" name="search" placeholder="e.g. Emma" required>
            </div>
            <button type="submit" class="btn" style="width:100%;">Search by Name</button>
        </form>

        <div class="link-section" style="margin-top: 24px;">
            <a href="index.html">← Back to Main</a>
        </div>
    </div>
</body>
</html>
