<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Sign Up</title>
    <link rel="stylesheet" href="style 2.css">
    <script src="calendar.js" defer></script>
</head>
<body>
    <div class="calendar">
    <div class="header">
        <button id="prevBtn"> &lt; </button>
        <div id="monthYear" class="monthYear"></div>
        <button id="nextBtn"> &gt; </button>
    </div>
    <div class="days">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
    </div>
    <div id="dates" class="dates-grid"></div>
</div>

<div id="time-selector" style="display:none; margin-top: 20px; background: white; padding: 15px; border-radius: 10px; width: 380px;">
    <p id="selected-date-label" style="font-weight: 600; margin-bottom: 10px;"></p>
    <div style="position: relative;">
        <button class="time-btn" onclick="toggleTimeMenu()" style="width: 100%; padding: 10px; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: bold;">
            12:00 PM
        </button>
        
        <div id="action-menu" class="hidden" style="position: absolute; width: 100%; background: white; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10;">
            <button onclick="alert('Proceeding to Info Page...')" style="display: block; width: 100%; padding: 10px; border: none; background: none; text-align: left; cursor: pointer;">Select and continue</button>
            <button style="display: block; width: 100%; padding: 10px; border: none; background: none; text-align: left; cursor: pointer; border-top: 1px solid #eee;">Select and add another time</button>
        </div>
    </div>
</div>
    <form method="POST" action="classSignup.php" style="margin-top: 30px; background: white; padding: 15px; border-radius: 10px; width: 380px;">

    <h3>Join Class Waitlist</h3>

    <label>Climber ID:</label>
    <input type="number" name="climberId" required style="width:100%; margin-bottom:10px;">

    <label>Class ID:</label>
    <input type="number" name="classId" required style="width:100%; margin-bottom:10px;">

    <button type="submit" style="width:100%; padding:10px;">Join Waitlist</button>

</form>

    
    
</body>
</html>
